:root {
    --red: #CE1C25;
    --blue: hsl(218, 93%, 32%); 
    --gold: #FF9C0F; 
    --white: #FFFFFF;
}
*, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

html {
    font-size: 62.5%; /* changes 1rem to equal exactly 10px*/
    scroll-behavior: smooth;
    overscroll-behavior-y: none;
    color-scheme: light; /* Enables system-level dark mode support*/
}

nav {
    display: flex;
    flex-direction: row;
    justify-content: space-between;
    padding: 1rem 2rem;
    background-color: cadetblue;
    position: sticky;
    top: 0;
    max-height: 80px;
    z-index: 1000;
}
nav img {
    width: 80px;
}


.nav-links {
    display: flex;
    justify-content: flex-end;
}

nav ul {
    display: flex;
    flex-direction: row;
    gap: 20px;
    justify-content: flex-end;
}

/* Slideshow container */
.slideshow-container {
    max-width: 1000px;
    position: relative;
    margin: auto;
}

/* Hide the images by default */
.mySlides {
    display: none;
}

.mySlides img {
    max-height: 500px;
    min-height: 400px;
    width: 100%;
}

.slide1 {
    background-image: url(images/tahiti_img_1.webp);
    padding: 2rem 4rem;
    background-size: cover;
    max-height: 500px;
    min-height: 400px;
}
.slide2 {
    background-image: url(images/tahiti_img_2.webp);
    padding: 2rem 4rem;
    background-size: cover;
    min-height: 400px;
}
.slide3 {
    background-image: url(images/tahiti_img_3.jpg);
    padding: 2rem 4rem;
    background-size: cover;
    min-height: 400px;
}
.slide4 {
    background-image: url(images/tahiti_img_4.webp);
    padding: 2rem 4rem;
    background-size: cover;
    min-height: 400px;
}

/* Next & Prev buttons */
.prev, .next {
  cursor: pointer;
  position: absolute;
  top: 50%;
  width: auto;
  margin-top: -22px;
  padding: 16px;
  color: white;
  font-weight: bold;
  font-size: 18px;
  transition: 0.6s ease;
  border-radius: 0 3px 3px 0;
  user-select: none;
}

/* Position the "next button" to the right */
.next {
    right: 0;
    border-radius: 3px 0 0 3px;
}

/* on hover, add a background color with a little bit see-through */
.prev:hover, .next:hover {
    background-color: rgba(0,0,0,0.8);
}
/* caption */
.text {
    color: #f2f2f2;
    font-size: 15px;
    padding: 8px 12px;
    position: absolute;
    bottom: 8px;
    width: 100%;
    text-align: center;
}

/* dots */
.dot {
    cursor: pointer;
    height: 15px;
    width: 15px;
    margin: 0 2px;
    background-color: #bbb;
    border-radius: 50%;
    display: inline-block;
    transition: background-color 0.6s ease;
}

.active, .dot:hover {
    background-color: #717171;
}

.hero {
    width: 100%;
    margin-top: 50px;
}

/* Card container */
.card-container {
    display: flex;
    flex-direction: row;
    gap: 5px;
    padding: 1rem 4rem;
    justify-content: center;
}

.card {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 200px;
    justify-content: center;
}

.card-thumb {
    text-align: center;
    margin-top: 0.75rem;
    font-weight: bold;
    letter-spacing: 0.5px;
}

/* span between cards */
.vr {
    background-color: #717171;
    width: 1px;
    height: 200px;
}

/* Featured section */
.container {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    margin: 0;
    padding: 0;
}
.thumbnail {
    max-width: 100%;
    font-size: 15px;
}

.thumbnail img {
    width: 100%;
    height: 190px;
    border-radius: 20px;
}

.featured {
    display: flex;
    flex-direction: row;
    gap: 20px;
    padding: 1rem 2rem;
    justify-content: center;
}

.activity {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 300px;
    justify-content: center;
}

/* Plan Your Getaway section */
.promotion-container {
    height: 400px;
    display: flex;
    justify-content: space-around;
    background-color: var(--white);
    background-size: cover;
    background-position: center;
}

.promotion-container img {
    max-width: 1000px;
    padding: 4rem 1rem;

}

.comp {
    padding: 4rem 1rem; 
}

.comp h2 {
    font-size: 6rem;
}
.comp p {
    font-size: 2rem;
}

.comp button {
    font-size: 1.4rem;
}


